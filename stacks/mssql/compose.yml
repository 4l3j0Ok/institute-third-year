services:
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: sqlserver
    env_file: .env
    ports:
      - "1433:1433"
      - "11433:1433"
    volumes:
      - sqlserverdata:/var/opt/mssql
    restart: unless-stopped
  
  cloudbeaver:
    image: dbeaver/cloudbeaver:latest
    ports:
      - "8978:8978"
    volumes:
      - cloudbeaver_data:/opt/cloudbeaver/workspace

volumes:
  cloudbeaver_data:
    driver: local
  sqlserverdata:
    driver: local
